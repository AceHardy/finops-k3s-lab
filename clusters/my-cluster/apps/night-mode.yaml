apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: sleep-nginx
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-finops-app
  minReplicaCount: 0
  maxReplicaCount: 3
  triggers:
  - type: cron
    metadata:
      timezone: Europe/Paris
      start: "26 12 * * *"
      end: "0 8 * * *"
      desiredReplicas: "0"