---
# 1. Le Profil "Gros Disque Dur" (Génère des coûts de Stockage / PV)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: database-storage
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi # Réservation de 50 Go de disque

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-database
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fake-db
  template:
    metadata:
      labels:
        app: fake-db
    spec:
      containers:
      - name: redis
        image: redis:alpine
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
        volumeMounts:
        - mountPath: "/data"
          name: data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: database-storage

---
# 2. Le Profil "Travailleur Acharné" (Fait monter l'Efficiency à 100%)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-worker
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: stress-test
        image: alpine
        command: ["/bin/sh", "-c", "while true; do :; done"] # Boucle mathématique infinie
        resources:
          requests:
            cpu: "500m"
            memory: "100Mi"