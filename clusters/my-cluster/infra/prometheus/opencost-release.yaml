apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: opencost
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: flux-system
  values:
    opencost:
      prometheus:
        internal:
          enabled: true
          serviceName: prometheus-kube-prometheus-prometheus
          namespaceName: default
          port: 9090
      
      # Configuration manuelle forcée
      customPricing:
        enabled: true
        costModel:
          description: "Mode Lab Local"
          currencyCode: "EUR"
          # On définit des prix par défaut pour n'importe quel CPU/RAM détecté
          cpu: "0.015"
          ram: "0.005"
          storage: "0.0002"

      # Variables d'environnement pour l'interface
      exporter:
        extraEnv:
          - name: CURRENCY
            value: "EUR"
      ui:
        extraEnv:
          - name: CURRENCY
            value: "EUR"