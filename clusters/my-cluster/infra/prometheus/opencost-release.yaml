apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: opencost
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: flux-system
  values:
    opencost:
      prometheus:
        internal:
          serviceName: prometheus-kube-prometheus-prometheus
          namespaceName: default
          port: 9090

      # Configuration FinOps - custom pricing OVH / Outscale
      customPricing:
        enabled: true
        CostModel:
          description: "Tarifs OVHcloud"
          currency: "EUR"        # ← currencyCode → currency
          CPU: "0.015"
          RAM: "0.005"
          storage: "0.0002"

      exporter:
        extraEnv:
          - name: CURRENCY       # ← manquait
            value: "EUR"