apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: opencost
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: flux-system
  values:
    opencost:
      metrics:
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: prometheus
            
      prometheus:
        internal:
          enabled: true
          serviceName: prometheus-kube-prometheus-prometheus
          namespaceName: default
          port: 9090
          
      customPricing:
        enabled: true
        provider: "custom"
        costModel:
          description: "Mode Lab Local"
          # Tarifs mensuels (Prix horaire x 730h)
          CPU: "10.95"      # (0.015 €/h)
          RAM: "3.65"       # (0.005 €/h)
          storage: "0.146"  # (0.0002 €/h)

      exporter:
        extraEnv:
          - name: CURRENCY
            value: "EUR"
      ui:
        extraEnv:
          - name: CURRENCY
            value: "EUR"