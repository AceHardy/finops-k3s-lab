apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: opencost
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: flux-system
  values:
    opencost:
      # --- LE BLOC EST MAINTENANT AU BON ENDROIT ---
      metrics:
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: prometheus # Le label secret pour que Prometheus l'accepte
            
      prometheus:
        internal:
          enabled: true
          serviceName: prometheus-kube-prometheus-prometheus
          namespaceName: default
          port: 9090
          
      customPricing:
        enabled: true
        provider: "custom"
        costModel:
          description: "Mode Lab Local"
          CPU: "0.015"
          RAM: "0.005"
          storage: "0.0002"

      exporter:
        extraEnv:
          - name: CURRENCY
            value: "EUR"
      ui:
        extraEnv:
          - name: CURRENCY
            value: "EUR"