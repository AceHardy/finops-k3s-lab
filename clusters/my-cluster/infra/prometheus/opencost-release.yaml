apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: opencost
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: flux-system
  values:
    opencost:
      prometheus:
        internal:
          enabled: true
          serviceName: prometheus-kube-prometheus-prometheus
          namespaceName: default
          port: 9090
      
      # Forcer le modèle de calcul en EUR
      customPricing:
        enabled: true
        costModel:
          currencyCode: "EUR"
          description: "Tarifs FinOps"
          cpu: "0.015"
          ram: "0.005"
          storage: "0.0002"

      # Forcer le moteur de calcul (Backend) en EUR
      exporter:
          extraEnv:
          - name: CURRENCY
            value: "EUR"

      # Forcer l'affichage (Frontend) en EUR
      ui:
        extraEnv:
          - name: CURRENCY
            value: "EUR"