apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: opencost
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: flux-system
  values:
    opencost:
      prometheus:           # niveau 3
        internal:
          serviceName: prometheus-kube-prometheus-prometheus
          namespaceName: default
          port: 9090

      customPricing:        # niveau 3 ← même niveau que prometheus
        enabled: true
        provider: "default"
        costModel:
          description: "Tarifs OVHcloud / Outscale"
          CPU: "0.015"
          RAM: "0.005"
          storage: "0.0002"

      exporter:             # niveau 3 ← même niveau que prometheus
        extraEnv:
          CURRENCY: "EUR"
    ui:
        extraEnv:
          - name: CURRENCY      # format liste ✅
            value: "EUR"