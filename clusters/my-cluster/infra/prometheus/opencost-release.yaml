apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: opencost
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: flux-system
  values:
    opencost:
      # 1. Connexion à la base de données de métriques
      prometheus:
        external:
          enabled: false
        internal:
          enabled: true
          serviceName: prometheus-kube-prometheus-prometheus
          namespaceName: default
          port: 9090
          
      # 2. Configuration du moteur de calcul (Backend)
      exporter:
        extraEnv:
          - name: CLOUD_PROVIDER
            value: "OVH"
          - name: OVH_SUBSIDIARY
            value: "FR"
          - name: CURRENCY
            value: "EUR"
            
      # 3. Configuration de l'interface graphique (Frontend)
      ui:
        extraEnv:
          - name: CURRENCY
            value: "EUR"