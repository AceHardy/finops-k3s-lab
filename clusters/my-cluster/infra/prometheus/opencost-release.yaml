apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: opencost
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: flux-system
  values:
    opencost:
      prometheus:
        internal:
          enabled: true
          serviceName: prometheus-kube-prometheus-prometheus
          namespaceName: default
          port: 9090
          
      # On force le mode manuel pour ignorer le fait que c'est un "Laptop"
      customPricing:
        enabled: true
        provider: "custom"
        costModel:
          description: "Tarifs FinOps Locaux"
          currencyCode: "EUR"
          CPU: "0.015"
          RAM: "0.005"
          storage: "0.0002"

      # On force la devise sur l'interface graphique
      ui:
        extraEnv:
          - name: CURRENCY
            value: "EUR"